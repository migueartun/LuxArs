<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Regístrate en LuxArs - Elige tu rol: Cliente o Fotógrafo Profesional">
    <title>Crear Cuenta - LuxArs</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <header class="navbar navbar-minimal">
        <div class="navbar-container">
            <div class="navbar-brand">
                <svg class="logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" fill="none" stroke="#E60D0D" stroke-width="2"/>
                    <circle cx="20" cy="18" r="5" fill="#E60D0D"/>
                    <circle cx="28" cy="28" r="3" fill="#E60D0D"/>
                </svg>
                <a href="index.html" class="brand-text">LuxArs</a>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-wrapper">
            <!-- Role Selection -->
            <div id="role-selection" class="auth-card role-card">
                <div class="auth-header">
                    <div class="auth-icon">👤</div>
                    <h1>Crear Cuenta</h1>
                    <p>¿Cuál es tu rol en LuxArs?</p>
                </div>

                <div class="role-options">
                    <button class="role-btn" onclick="selectRole('cliente')">
                        <div class="role-icon">🔍</div>
                        <h3>Soy Cliente</h3>
                        <p>Busco fotógrafos profesionales para mis eventos o proyectos.</p>
                    </button>

                    <button class="role-btn" onclick="selectRole('fotografo')">
                        <div class="role-icon">📸</div>
                        <h3>Soy Fotógrafo</h3>
                        <p>Ofrezco mis servicios y quiero conseguir más clientes.</p>
                    </button>
                </div>

                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? 
                        <a href="login.html" class="auth-link">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>

            <!-- Client Registration Form -->
            <div id="client-form" class="auth-card hidden">
                <div class="auth-header">
                    <a href="#" class="back-btn" onclick="backToRole(event)">← Atrás</a>
                    <div class="auth-icon">🔍</div>
                    <h1>Registro - Cliente</h1>
                </div>

                <form class="auth-form" onsubmit="handleClientRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="client-firstName">Nombre</label>
                            <input 
                                type="text" 
                                id="client-firstName" 
                                name="firstName" 
                                placeholder="Juan" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label for="client-lastName">Apellido</label>
                            <input 
                                type="text" 
                                id="client-lastName" 
                                name="lastName" 
                                placeholder="García" 
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="client-email">Email</label>
                        <input 
                            type="email" 
                            id="client-email" 
                            name="email" 
                            placeholder="tu@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-phone">Teléfono</label>
                        <input 
                            type="tel" 
                            id="client-phone" 
                            name="phone" 
                            placeholder="+34 600 000 000" 
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-password">Contraseña</label>
                        <input 
                            type="password" 
                            id="client-password" 
                            name="password" 
                            placeholder="Mínimo 8 caracteres" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="client-confirm-password">Confirmar Contraseña</label>
                        <input 
                            type="password" 
                            id="client-confirm-password" 
                            name="confirmPassword" 
                            placeholder="Confirma tu contraseña" 
                            required
                        >
                    </div>

                    <label class="form-checkbox">
                        <input type="checkbox" required>
                        Acepto los <a href="#" class="auth-link">Términos de Servicio</a>
                    </label>

                    <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
                </form>
            </div>

            <!-- Photographer Registration Form -->
            <div id="photographer-form" class="auth-card hidden">
                <div class="auth-header">
                    <a href="#" class="back-btn" onclick="backToRole(event)">← Atrás</a>
                    <div class="auth-icon">📸</div>
                    <h1>Registro - Fotógrafo</h1>
                </div>

                <form class="auth-form" onsubmit="handlePhotographerRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="photo-firstName">Nombre</label>
                            <input 
                                type="text" 
                                id="photo-firstName" 
                                name="firstName" 
                                placeholder="María" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label for="photo-lastName">Apellido</label>
                            <input 
                                type="text" 
                                id="photo-lastName" 
                                name="lastName" 
                                placeholder="López" 
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="photo-email">Email</label>
                        <input 
                            type="email" 
                            id="photo-email" 
                            name="email" 
                            placeholder="tu@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="photo-phone">Teléfono</label>
                        <input 
                            type="tel" 
                            id="photo-phone" 
                            name="phone" 
                            placeholder="+34 600 000 000" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="photo-specialty">Especialidad Fotográfica</label>
                        <select id="photo-specialty" name="specialty" required>
                            <option value="">Selecciona una especialidad</option>
                            <option value="bodas">Bodas</option>
                            <option value="eventos">Eventos Corporativos</option>
                            <option value="retratos">Retratos Profesionales</option>
                            <option value="producto">Fotografía de Producto</option>
                            <option value="arquitectura">Arquitectura</option>
                            <option value="naturaleza">Naturaleza</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="photo-location">Ubicación / Ciudad</label>
                        <input 
                            type="text" 
                            id="photo-location" 
                            name="location" 
                            placeholder="Tu ciudad" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="photo-password">Contraseña</label>
                        <input 
                            type="password" 
                            id="photo-password" 
                            name="password" 
                            placeholder="Mínimo 8 caracteres" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="photo-confirm-password">Confirmar Contraseña</label>
                        <input 
                            type="password" 
                            id="photo-confirm-password" 
                            name="confirmPassword" 
                            placeholder="Confirma tu contraseña" 
                            required
                        >
                    </div>

                    <label class="form-checkbox">
                        <input type="checkbox" required>
                        Acepto los <a href="#" class="auth-link">Términos de Servicio</a>
                    </label>

                    <button type="submit" class="btn btn-primary btn-block">Crear Cuenta de Fotógrafo</button>
                </form>
            </div>
        </div>
    </main>

    <script src="assets/js/auth.js" defer></script>
</body>
</html>
