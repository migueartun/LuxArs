<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en LuxArs - Marketplace de Fotografía Profesional">
    <title>Iniciar Sesión - LuxArs</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <header class="navbar navbar-minimal">
        <div class="navbar-container">
            <div class="navbar-brand">
                <svg class="logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" fill="none" stroke="#E60D0D" stroke-width="2"/>
                    <circle cx="20" cy="18" r="5" fill="#E60D0D"/>
                    <circle cx="28" cy="28" r="3" fill="#E60D0D"/>
                </svg>
                <a href="index.html" class="brand-text">LuxArs</a>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">📸</div>
                    <h1>Iniciar Sesión</h1>
                    <p>Inicia sesión en tu cuenta de LuxArs</p>
                </div>

                <form class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="tu@email.com" 
                            required
                            aria-label="Email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            required
                            aria-label="Contraseña"
                        >
                    </div>

                    <div class="form-remember">
                        <label for="remember">
                            <input type="checkbox" id="remember" name="remember">
                            Recuérdame
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
                </form>

                <div class="auth-divider">o</div>

                <div class="social-login">
                    <button class="btn btn-social" onclick="loginWithGoogle()">
                        <span>🔵</span> Google
                    </button>
                    <button class="btn btn-social" onclick="loginWithFacebook()">
                        <span>📱</span> Facebook
                    </button>
                </div>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? 
                        <a href="register.html" class="auth-link">Regístrate aquí</a>
                    </p>
                </div>
            </div>

            <!-- Test Credentials Card -->
            <div class="test-credentials">
                <h3>👥 Usuarios de Prueba</h3>
                <div class="credential-item">
                    <p><strong>Cliente:</strong></p>
                    <p>Email: cliente@test.com</p>
                    <p>Pass: password</p>
                </div>
                <div class="credential-item">
                    <p><strong>Fotógrafo:</strong></p>
                    <p>Email: fotografo@test.com</p>
                    <p>Pass: password</p>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/auth.js" defer></script>
</body>
</html>
